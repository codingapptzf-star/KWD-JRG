<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Aplikasi Desa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { max-width: 420px; width: 100%; border-radius: 16px; box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
    .logo-area { text-align: center; margin-bottom: 24px; }
    .logo-area i { font-size: 48px; color: #0d6efd; }
  </style>
</head>
<body>
  <div class="card login-card p-4">
    <div class="logo-area">
      <i class="bi bi-shield-lock-fill"></i>
      <h4 class="mt-2 fw-bold">Aplikasi Desa</h4>
      <p class="text-muted small mb-0">Silakan login untuk melanjutkan</p>
    </div>
    
    <form id="loginForm" name="loginForm" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label fw-medium">Email</label>
        <input type="email" class="form-control form-control-lg" id="email" name="email" autocomplete="email" required placeholder="admin@desa.go.id">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label fw-medium">Password</label>
        <input type="password" class="form-control form-control-lg" id="password" name="current-password" autocomplete="current-password" required placeholder="••••••••">
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary btn-lg" id="btnLogin">Masuk</button>
      </div>
      <div id="alertArea" class="mt-3"></div>
    </form>
  </div>

  <!-- Bootstrap JS (Wajib untuk alert & komponen interaktif) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Logic Aplikasi -->
  <script src="app.js"></script>
</body>
</html>
