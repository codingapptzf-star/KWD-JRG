<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Warga - Aplikasi Desa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    body { background: #f8f9fa; }
    .sidebar { min-height: 100vh; background: #212529; color: white; position: sticky; top: 0; }
    .sidebar a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 10px 15px; display: block; border-radius: 4px; margin-bottom: 4px; }
    .sidebar a:hover, .sidebar a.active { background: #0d6efd; color: white; }
    .content { padding: 20px; }
    .table th { font-weight: 600; font-size: 0.9rem; background: #e9ecef; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <div class="col-md-2 sidebar p-3 d-none d-md-block">
        <h5 class="mb-4">🏘️ Aplikasi Desa</h5>
        <nav>
          <a href="dashboard.html"><i class="bi bi-house me-2"></i>Dashboard</a>
          <a href="warga.html" class="active"><i class="bi bi-people me-2"></i>Data Warga</a>
          <a href="#"><i class="bi bi-file-earmark-text me-2"></i>Surat Menyurat</a>
          <a href="#"><i class="bi bi-gear me-2"></i>Pengaturan</a>
        </nav>
        <hr>
        <div class="small" id="userInfo">Memuat profil...</div>
        <button class="btn btn-sm btn-outline-light mt-2 w-100" onclick="logout()">Logout</button>
      </div>

      <!-- Main Content -->
      <div class="col-md-10 content">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="mb-0"><i class="bi bi-people-fill me-2"></i>Data Warga</h4>
          <button class="btn btn-primary" onclick="alert('Fitur tambah warga akan segera hadir!')">
            <i class="bi bi-plus-lg me-1"></i> Tambah Warga
          </button>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <input type="text" id="searchInput" class="form-control mb-3" placeholder="🔍 Cari NIK, Nama, atau Alamat...">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead>
                  <tr>
                    <th>NIK</th><th>Nama</th><th>L/P</th><th>Agama</th><th>Pekerjaan</th><th>Status</th><th>Alamat</th>
                  </tr>
                </thead>
                <tbody id="tableBody">
                  <tr><td colspan="7" class="text-center py-4 text-muted"> Memuat data warga...</td></tr>
                </tbody>
              </table>
            </div>
            <div id="emptyState" class="text-center py-4 d-none text-muted">Tidak ada data ditemukan</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- app.js tetap dipanggil untuk fungsi logout -->
  <script src="app.js"></script>
  
  <script>
    // Gunakan nama 'db' agar tidak bentrok dengan app.js
    const db = window.supabase.createClient(
      'https://ogrboadxaeymeqsksdau.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ncmJvYWR4YWV5bWVxc2tzZGF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NzczNDAsImV4cCI6MjA5MTQ1MzM0MH0.liLIar3JdLuYq2ni0ANKHL4z0MJ8mP01MVS9eEt3EoU'
    );
  
    let refMap = {};
    let wargaList = [];
  
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        // 1. Cek Login
        const {  { session } } = await db.auth.getSession();
        if (!session) return window.location.href = 'index.html';
  
        // 2. Tampilkan Profil
        const {  profile } = await db.from('users_profile').select('nama_lengkap, role').eq('id', session.user.id).single();
        if (profile) document.getElementById('userInfo').innerHTML = `<strong>${profile.nama_lengkap}</strong><br><small>${profile.role}</small>`;
  
        // 3. Load Referensi
        const {  refData, error: refErr } = await db.from('ref_master').select('kategori, kode_asli, label');
        if (refErr) throw new Error('Gagal load ref_master: ' + refErr.message);
        
        refData.forEach(r => {
          if (!refMap[r.kategori]) refMap[r.kategori] = {};
          refMap[r.kategori][r.kode_asli] = r.label;
        });
  
        // 4. Load Data Warga
        const {  warga, error: wargaErr } = await db
          .from('warga')
          .select('nik, nama_lengkap, jenis_kelamin_id, agama_id, pekerjaan_id, status_perkawinan_id, status_dasar_id, alamat, rt, rw')
          .order('created_at', { ascending: false })
          .limit(100);
  
        if (wargaErr) throw new Error('Gagal load warga: ' + wargaErr.message);
  
        wargaList = warga || [];
        renderTable(wargaList);
  
      } catch (err) {
        console.error('❌ Error:', err);
        document.getElementById('tableBody').innerHTML = `
          <tr><td colspan="7" class="text-center text-danger py-4">
            ️ Gagal memuat data.<br>
            <small class="text-muted">${err.message}</small><br>
            <small class="text-muted">Tekan F12 > Console untuk detail.</small>
          </td></tr>`;
      }
    });
  
    function getLabel(kat, id) {
      return (refMap[kat] && refMap[kat][id]) ? refMap[kat][id] : (id || '-');
    }
  
    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      const empty = document.getElementById('emptyState');
      if (!data.length) { tbody.innerHTML = ''; empty.classList.remove('d-none'); return; }
      empty.classList.add('d-none');
  
      tbody.innerHTML = data.map(w => `
        <tr>
          <td class="font-monospace small">${w.nik || '-'}</td>
          <td class="fw-medium">${w.nama_lengkap || '-'}</td>
          <td>${getLabel('jenis_kelamin', w.jenis_kelamin_id)}</td>
          <td>${getLabel('agama', w.agama_id)}</td>
          <td class="small">${getLabel('pekerjaan', w.pekerjaan_id)}</td>
          <td><span class="badge bg-secondary">${getLabel('status_dasar', w.status_dasar_id)}</span></td>
          <td class="small text-muted">${[w.alamat, 'RT'+w.rt, 'RW'+w.rw].filter(Boolean).join(', ') || '-'}</td>
        </tr>
      `).join('');
    }
  
    document.getElementById('searchInput').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      const filtered = wargaList.filter(w => 
        (w.nik||'').includes(q) || (w.nama_lengkap||'').toLowerCase().includes(q) || (w.alamat||'').toLowerCase().includes(q)
      );
      renderTable(filtered);
    });
  </script>
</body>
</html>
